<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #4ecca3;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    #scoreboard span {
      color: #a0a0c0;
    }

    #scoreboard strong {
      color: #f5f5f5;
    }

    #game-container {
      position: relative;
    }

    canvas {
      display: block;
      border: 3px solid #4ecca3;
      border-radius: 4px;
      background-color: #16213e;
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.4);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: rgba(22, 33, 62, 0.88);
      border-radius: 2px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #4ecca3;
      margin-bottom: 0.5rem;
    }

    #overlay p {
      font-size: 1rem;
      color: #a0a0c0;
      margin-bottom: 1.5rem;
    }

    #overlay .final-score {
      font-size: 1.4rem;
      color: #f5f5f5;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid #4ecca3;
      border-radius: 4px;
      background: transparent;
      color: #4ecca3;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    button:hover {
      background: #4ecca3;
      color: #16213e;
    }

    #controls {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #606080;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>🐍 Snake</h1>

  <div id="scoreboard">
    <div><span>Score: </span><strong id="score">0</strong></div>
    <div><span>High Score: </span><strong id="high-score">0</strong></div>
    <div><span>Level: </span><strong id="level">1</strong></div>
  </div>

  <div id="game-container">
    <canvas id="canvas" width="400" height="400"></canvas>

    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <div id="final-score-display" class="final-score" style="display:none"></div>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <div id="controls">
    ↑ ↓ ← → &nbsp;or&nbsp; W A S D &nbsp;— Move &nbsp;|&nbsp; P — Pause
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const COLS = 20;
    const ROWS = 20;
    const CELL = canvas.width / COLS; // 20px

    const DIRECTIONS = {
      ArrowUp:    { x: 0, y: -1 },
      ArrowDown:  { x: 0, y:  1 },
      ArrowLeft:  { x: -1, y: 0 },
      ArrowRight: { x:  1, y: 0 },
      w: { x: 0, y: -1 },
      s: { x: 0, y:  1 },
      a: { x: -1, y: 0 },
      d: { x:  1, y: 0 },
      W: { x: 0, y: -1 },
      S: { x: 0, y:  1 },
      A: { x: -1, y: 0 },
      D: { x:  1, y: 0 },
    };

    // ── State ─────────────────────────────────────────────────────────────────
    let snake, direction, nextDirection, food, score, highScore, level;
    let gameLoop = null;
    let paused = false;
    let gameOver = false;

    const scoreEl     = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const levelEl     = document.getElementById('level');
    const overlay     = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg  = document.getElementById('overlay-msg');
    const finalScoreEl = document.getElementById('final-score-display');
    const startBtn    = document.getElementById('start-btn');

    highScore = Number(localStorage.getItem('snakeHighScore') || 0);
    highScoreEl.textContent = highScore;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function randomCell() {
      return {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS),
      };
    }

    function spawnFood() {
      let cell;
      do {
        cell = randomCell();
      } while (snake.some(s => s.x === cell.x && s.y === cell.y));
      food = cell;
    }

    function intervalForLevel(lvl) {
      // Start at 200 ms, decrease by 15 ms per level, minimum 60 ms
      return Math.max(60, 200 - (lvl - 1) * 15);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      direction     = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score  = 0;
      level  = 1;
      paused = false;
      gameOver = false;

      scoreEl.textContent = 0;
      levelEl.textContent = 1;

      spawnFood();
    }

    // ── Game tick ─────────────────────────────────────────────────────────────
    function tick() {
      if (paused || gameOver) return;

      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y,
      };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame();
        return;
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Ate food?
      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        scoreEl.textContent = score;

        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snakeHighScore', highScore);
        }

        // Level up every 50 points
        const newLevel = Math.floor(score / 50) + 1;
        if (newLevel !== level) {
          level = newLevel;
          levelEl.textContent = level;
          restartLoop();
        }

        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    // ── Drawing ───────────────────────────────────────────────────────────────
    function draw() {
      // Background grid
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Subtle grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
      }

      // Food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const fr = CELL / 2 - 2;
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(fx, fy, fr, 0, Math.PI * 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(fx - fr * 0.25, fy - fr * 0.3, fr * 0.3, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const alpha = 1 - (i / snake.length) * 0.5;
        if (i === 0) {
          ctx.fillStyle = `rgba(78, 204, 163, ${alpha})`;
        } else {
          ctx.fillStyle = `rgba(52, 160, 120, ${alpha})`;
        }
        const padding = 1;
        ctx.beginPath();
        ctx.roundRect(
          seg.x * CELL + padding,
          seg.y * CELL + padding,
          CELL - padding * 2,
          CELL - padding * 2,
          3
        );
        ctx.fill();

        // Eyes on head
        if (i === 0) {
          ctx.fillStyle = '#16213e';
          const ex = seg.x * CELL;
          const ey = seg.y * CELL;
          // Position eyes relative to direction
          const eyeOffset = 5;
          const eyeSize = 2.5;
          if (direction.x !== 0) {
            // Moving horizontally
            const eyeX = ex + (direction.x > 0 ? CELL - eyeOffset : eyeOffset);
            ctx.beginPath();
            ctx.arc(eyeX, ey + CELL * 0.3, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX, ey + CELL * 0.7, eyeSize, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // Moving vertically
            const eyeY = ey + (direction.y > 0 ? CELL - eyeOffset : eyeOffset);
            ctx.beginPath();
            ctx.arc(ex + CELL * 0.3, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + CELL * 0.7, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });
    }

    // ── Game over ─────────────────────────────────────────────────────────────
    function endGame() {
      gameOver = true;
      clearInterval(gameLoop);
      gameLoop = null;

      overlayTitle.textContent = 'Game Over';
      overlayMsg.textContent   = '';
      finalScoreEl.textContent = `Score: ${score}`;
      finalScoreEl.style.display = 'block';
      startBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    // ── Loop management ───────────────────────────────────────────────────────
    function restartLoop() {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, intervalForLevel(level));
    }

    function startGame() {
      overlay.style.display = 'none';
      finalScoreEl.style.display = 'none';
      initGame();
      draw();
      restartLoop();
    }

    // ── Input ─────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'p' || e.key === 'P') {
        if (gameOver) return;
        paused = !paused;
        if (paused) {
          overlayTitle.textContent = 'Paused';
          overlayMsg.textContent = 'Press P to resume';
          finalScoreEl.style.display = 'none';
          startBtn.style.display = 'none';
          overlay.style.display = 'flex';
        } else {
          overlay.style.display = 'none';
          startBtn.style.display = '';
        }
        return;
      }

      const dir = DIRECTIONS[e.key];
      if (!dir) return;

      // Prevent reversing direction
      if (dir.x === -direction.x && dir.y === -direction.y) return;

      nextDirection = dir;

      // Prevent default scroll
      if (e.key.startsWith('Arrow')) e.preventDefault();
    });

    startBtn.addEventListener('click', startGame);

    // Initial draw so the canvas isn't blank behind the overlay
    initGame();
    draw();
  </script>
</body>
</html>
